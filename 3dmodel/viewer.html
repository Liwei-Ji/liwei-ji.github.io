<!DOCTYPE html>
<html lang="zh-en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>3D Models</title>

    <link rel="stylesheet" href="../projects/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    </script>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        model-viewer {
            width: 100%;
            height: 100vh;
            background: #f5f5f5;
        }
    </style>

</head>

<body>

    <a href="../" class="back-button" aria-label="Go back">
        <i class="fas fa-xmark"></i>
    </a>

    <model-viewer id="my-viewer" camera-controls auto-rotate shadow-intensity="1" exposure="1">
    </model-viewer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'astronaut';
        const viewer = document.getElementById('my-viewer');
        viewer.src = `./${modelName}.glb`;
    </script>

</body>

</html>
